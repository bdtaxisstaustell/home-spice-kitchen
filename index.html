<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Catering - Home Spice Catering</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#f6f6f6;
}

/* HEADER */
.header {
    background:#c0392b;
    color:white;
    text-align:center;
    padding:20px;
}

.header h1 {
    margin:0;
    font-size:28px;
}

.header p {
    margin:5px 0 0;
}

/* CONTAINER */
.container {
    max-width:800px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:12px;
}

/* INPUTS */
input, select, textarea {
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:6px;
    border:1px solid #ccc;
}

label {
    font-weight:bold;
    margin-top:15px;
    display:block;
}

/* BUTTON */
.btn {
    background:#c0392b;
    color:white;
    padding:14px;
    border:none;
    border-radius:8px;
    margin-top:20px;
    cursor:pointer;
    width:100%;
    font-size:16px;
}

/* FOOTER */
.footer {
    text-align:center;
    padding:20px;
    color:#aaa;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <h1>Home Spice Catering</h1>
    <p>Powered by Trina’s Cloud Kitchen</p>
</div>

<!-- FORM -->
<div class="container">

<h2>Event Catering Booking</h2>
<p>Let us cater your special event with authentic homemade food.</p>

<label>Name</label>
<input id="name">

<label>Phone Number</label>
<input id="phone">

<label>Event Type</label>
<select id="eventType">
<option>Birthday</option>
<option>Wedding</option>
<option>Party</option>
<option>Corporate</option>
</select>

<label>Number of Guests</label>
<input id="guests" type="number">

<label>Event Address</label>
<input id="address">

<label>Distance (miles)</label>
<input id="miles" oninput="calcDelivery()">

<p>Delivery Fee: £<span id="deliveryFee">0</span></p>

<label>Event Date</label>
<input type="date" id="date">

<label>Event Time</label>
<select id="time">
<option value="">Select Time</option>
<option>12:00</option>
<option>14:00</option>
<option>18:00</option>
<option>20:00</option>
</select>

<label>Additional Notes</label>
<textarea id="notes"></textarea>

<button class="btn" onclick="sendBooking()">Send Booking via WhatsApp</button>

</div>

<!-- FOOTER -->
<div class="footer">
<p>© Home Spice Catering</p>
</div>

<script>
let deliveryFee = 0;

/* DELIVERY */
function calcDelivery(){
    let miles = parseFloat(document.getElementById("miles").value) || 0;
    deliveryFee = miles * 1.5;
    document.getElementById("deliveryFee").innerText = deliveryFee.toFixed(2);
}

/* TIME VALIDATION */
function validTime(){
    let date = document.getElementById("date").value;
    let time = document.getElementById("time").value;

    if(!date || !time) return false;

    let now = new Date();
    let selected = new Date(date + "T" + time);

    let diff = (selected - now) / 1000 / 60 / 60;

    return diff >= 3;
}

/* SEND WHATSAPP */
function sendBooking(){

    if(!validTime()){
        alert("Minimum 3 hours notice required");
        return;
    }

    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let type = document.getElementById("eventType").value;
    let guests = document.getElementById("guests").value;
    let address = document.getElementById("address").value;
    let date = document.getElementById("date").value;
    let time = document.getElementById("time").value;
    let notes = document.getElementById("notes").value;

    let message = "📅 Event Catering Booking\n\n";

    message += "Name: " + name + "\n";
    message += "Phone: " + phone + "\n";
    message += "Event: " + type + "\n";
    message += "Guests: " + guests + "\n";
    message += "Address: " + address + "\n";

    message += "\nDate: " + date + "\n";
    message += "Time: " + time + "\n";

    message += "\nDelivery Fee: £" + deliveryFee.toFixed(2);

    if(notes){
        message += "\nNotes: " + notes;
    }

    let url = "https://wa.me/441726806556?text=" + encodeURIComponent(message);

    window.open(url, "_blank");
}
</script>

</body>
</html>
